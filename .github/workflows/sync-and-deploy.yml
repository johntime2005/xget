name: Sync Upstream & Deploy

on:
  schedule:
    - cron: '0 0 * * *'   # 每天 UTC 0 点
  workflow_dispatch:       # 手动触发

permissions:
  contents: write          # 允许 push

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Sync upstream
        id: sync
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/xixu-me/xget.git
          git fetch upstream main
          BEFORE=$(git rev-parse HEAD)
            if git rebase upstream/main -X ours 2>/dev/null; then
            AFTER=$(git rev-parse HEAD)
            if [ "$BEFORE" != "$AFTER" ]; then
              echo "CHANGED=1" >> "$GITHUB_OUTPUT"
              git push origin main --force-with-lease
              echo "✅ Synced upstream changes"
            else
              echo "CHANGED=0" >> "$GITHUB_OUTPUT"
              echo "⏭ Already up to date"
            fi
          else
            git rebase --abort 2>/dev/null || true
            echo "CHANGED=0" >> "$GITHUB_OUTPUT"
            echo "⚠️ Rebase conflict, skipped sync (manual fix needed)"
          fi

      - name: Deploy to Cloudflare Workers
        if: steps.sync.outputs.CHANGED == '1'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
